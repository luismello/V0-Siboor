[include Config/SKR-mini-E3-V3.0-klipper.cfg]
[include Config/V0Display.cfg]
#[include Config/adxl.cfg]
[include Macros/*.cfg]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 6000
max_z_velocity:21
max_z_accel: 25

[input_shaper]
shaper_freq_x: 95 #86.2 #65.2
shaper_type_x: mzv
shaper_freq_y: 92.4 #45.4
shaper_type_y: mzv

[gcode_arcs]
resolution: 0.05

[exclude_object]

