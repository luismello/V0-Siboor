# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# See docs/Config_Reference.md for a description of parameters.

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 32 #16
full_steps_per_rotation: 200  
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 50
homing_retract_dist: 0
#step_pulse_duration: 0.000004


[tmc2209 stepper_x]
uart_pin: PC11
diag_pin: ^PC0
tx_pin: PC10
uart_address: 0
run_current: 0.80
stealthchop_threshold: 0
sense_resistor: 0.110
driver_SGTHRS: 80
interpolate: true

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 32 #16
full_steps_per_rotation: 200
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 50
homing_retract_dist: 0
homing_positive_dir: true
#step_pulse_duration: 0.000004

[tmc2209 stepper_y]
uart_pin: PC11
diag_pin: ^PC1
tx_pin: PC10
uart_address: 2
run_current: 0.80
stealthchop_threshold: 0
sense_resistor: 0.110
driver_SGTHRS: 65
interpolate: true

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 32 #16
rotation_distance: 8
endstop_pin: ^PC2
#position_endstop: 0.0
position_max: 120
position_min: -5
homing_speed: 120
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999
interpolate: true

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 32
step_pulse_duration: 0.0000004
rotation_distance: 22.269
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 295
max_extrude_cross_section: 150

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.550

[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 115
max_power: 1.0

[heater_fan heatbreak_cooling_fan]
pin: PC7

[temperature_fan host_fan]   #Electrical bin cooling fan
pin: PB15                   
kick_start_time: 0.500
sensor_type: temperature_host
control: watermark
target_temp: 35
min_temp: 0
max_temp: 90
max_speed: 1.0
min_speed: 1.0

[fan]
pin: PC6
cycle_time: 0.50

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2B004F000150414D39343620-if00

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

# See the sample-lcd.cfg file for definitions of common LCD displays.

[temperature_sensor SKR_Mini]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100